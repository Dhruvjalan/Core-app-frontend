name: 2. Deploy Production Docker to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy-to-ec2:
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set lowercase repository owner
        run: |
          echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      # We tag the latest merged code as 'production' so EC2 knows what to run
      - name: Log in to GHCR and Retag Image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Pull the image that was built during the PR (using the commit SHA)
          # Note: In a highly advanced setup, you'd pull the PR tag, but for simplicity on push:
          docker build -t ghcr.io/$REPO_OWNER/core-frontend:production \
            --build-arg VITE_PROD_BACKEND_URL=${{ secrets.VITE_PROD_BACKEND_URL }} .
          
          docker push ghcr.io/$REPO_OWNER/core-frontend:production

      - name: Deploy Docker Container to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Log EC2 into GitHub Container Registry (Needs a Personal Access Token as a secret)
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            
            # 2. Pull the newly pushed production image
            docker pull ghcr.io/${{ github.repository_owner }}/core-frontend:production
            
            # 3. Stop and remove the old container if it exists
            docker stop frontend-app || true
            docker rm frontend-app || true
            
            # 4. Run the new container, mapping EC2's port 80 to the container's Nginx port 80
            docker run -d \
              --name frontend-app \
              -p 80:80 \
              --restart unless-stopped \
              ghcr.io/${{ github.repository_owner }}/core-frontend:production
            
            # 5. Clean up old unused images to save EC2 disk space
            docker image prune -f

      - name: Run Backend Smoke Test
        env: 
            VITE_PROD_BACKEND_URL: ${{ secrets.VITE_PROD_BACKEND_URL }}
            TEST_ROLL_NO: "ed24b047"
        run: |
          chmod +x smoke-test.sh
          ./smoke-test.sh