name: Deploy Core Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        env:
            VITE_DEV_BACKEND_URL: ${{ secrets.VITE_DEV_BACKEND_URL }}
            VITE_PROD_BACKEND_URL: ${{ secrets.VITE_PROD_BACKEND_URL }}
            VITE_PRODUCTION: ${{ secrets.VITE_PRODUCTION }}
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: npx playwright test
        env:
            BASE_URL: ${{secrets.FRONTEND_BASE_URL}}

      - name: Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/html/core-frontend"
          strip_components: 1
          rm: true

      - name: Fix Permissions & Health Check
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo chown -R www-data:www-data /var/www/html/core-frontend
            # Basic check: verify index.html exists
            if [ -f "/var/www/html/core-frontend/index.html" ]; then
              echo "Deployment successful: index.html is in place."
            else
              echo "Deployment failed: index.html not found."
              exit 1
            fi